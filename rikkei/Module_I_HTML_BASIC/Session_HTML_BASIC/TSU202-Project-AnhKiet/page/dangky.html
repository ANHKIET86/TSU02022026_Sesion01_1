<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./dangky.css">
</head>
<body>
    <main class="wrap">
      <h1 class="title">Đăng ký tài khoản</h1>
      <p class="sub">Đăng ký tài khoản để sử dụng dịch vụ</p>
  
      <form class="form">
        <div class="row2">
          <div class="field">
            <label for="family">Họ và tên đệm</label>
            <input id="family" type="text" />
          </div>
  
          <div class="field">
            <label for="name">Tên</label>
            <input id="name" type="text" />
          </div>
        </div>
  
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@company.com" />
        </div>
  
        <div class="field">
          <label for="pass">Mật khẩu</label>
          <input id="pass" type="password" />
        </div>
  
        <div class="field">
          <label for="pass2">Xác nhận mật khẩu</label>
          <input id="pass2" type="password" />
        </div>
  
        <label class="agree">
          <input type="checkbox" />
          <span>Bạn đồng ý với <a href="#">chính sách và điều khoản</a></span>
        </label>
  
        <button class="btn" type="submit">Đăng ký</button>
  
        <p class="bottom">
          Bạn đã có tài khoản? <a href="./dangnhap.html">Đăng nhập</a>
        </p>
      </form>
    </main>
  </body>
</html>
