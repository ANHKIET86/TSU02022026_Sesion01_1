<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./dangnhap.css">
</head>
<body>
  <main class="card">
    <h1 class="title">Đăng nhập</h1>
    <p class="subtitle">Đăng nhập tài khoản để sử dụng hệ thống quản lý.</p>

    <form class="form" action="#" method="post">
      <div class="form-group">
        <label for="email" class="label">Email</label>
        <input id="email" name="email" type="email" class="input" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password" class="label">Mật khẩu</label>
        <input id="password" name="password" type="password" class="input" autocomplete="current-password" />
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" name="remember" class="checkbox" />
          <span>Nhớ tài khoản</span>
        </label>

        <a class="link" href="#">Quên mật khẩu?</a>
      </div>

      <button class="btn" type="submit">Đăng nhập</button>

      <div class="footer">
        Bạn chưa có tài khoản? <a class="link" href="./dangky.html">Đăng ký</a>
      </div>
    </form>
  </main>
  </body>
</html>
