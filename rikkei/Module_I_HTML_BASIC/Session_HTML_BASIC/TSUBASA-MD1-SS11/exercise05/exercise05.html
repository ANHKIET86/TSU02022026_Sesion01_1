<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tính BMI</title>
</head>
<body>
  <h2>Tính BMI</h2>

  <p>Nhập cân nặng (kg) và chiều cao (m) để tính BMI.</p>

  <label>
    Cân nặng (kg):
    <input id="weight" type="number" step="0.1" placeholder="VD: 60" />
  </label>

  <br><br>

  <label>
    Chiều cao (m):
    <input id="height" type="number" step="0.01" placeholder="VD: 1.70" />
  </label>

  <br><br>

  <button id="calcBtn">Tính BMI</button>

  <script src="./exercise05.js"></script>
</body>
</html>
