<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sở thích của bạn</title>
</head>
<body style="background-color: #f0f0f0; display: flex; justify-content: center; padding-top: 20px;">

    <form>
        <fieldset style="border: 15px solid rgb(194, 233, 248); background-color: white; padding: 0; width: 500px;">
            
            <h2 style="margin: 0 0 15px 0; color: white; background: red; text-align: center; padding: 10px;">SỞ THÍCH CỦA BẠN</h2>
    
            <table style="width: 100%; border-collapse: collapse; margin-left: 10px;">
                <tr>
                    <td style="color: blue; width: 100px; padding: 10px 0;">Họ và tên:</td>
                    <td><input type="text" id="Name" name="Name" style="width: 80%;"></td>
                </tr>
                
                <tr>
                    <td style="color: blue; padding: 10px 0;">Email:</td>
                    <td><input type="email" id="email" name="email" style="width: 60%;"></td>
                </tr>
                
                <tr>
                    <td style="vertical-align: top; color: blue; padding: 10px 0;">Sở thích:</td>
                    <td>
                        <table style="color: orange; width: 100%;">
                            <tr>
                                <td><input type="checkbox"> Thể thao</td>
                                <td><input type="checkbox"> Âm nhạc</td>
                                <td><input type="checkbox"> Đọc sách</td>
                            </tr>
                            <tr>
                                <td><input type="checkbox"> Lướt web</td>
                                <td><input type="checkbox"> Chơi game</td>
                                <td><input type="checkbox"> Điện ảnh</td>
                            </tr>
                            <tr>
                                <td><input type="checkbox"> Du lịch</td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td style="padding: 20px 0;">
                        <input type="submit" value="Gửi thông tin">
                        <input type="reset" value="Nhập lại">
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>

</body>
</html>
