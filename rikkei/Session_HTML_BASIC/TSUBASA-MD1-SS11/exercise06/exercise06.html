<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tính BMI</title>
</head>
<body>
  <h2>Tính BMI</h2>

  <label>
    Cân nặng (kg):
    <input id="weight" type="number" step="0.1" placeholder="VD: 60" />
  </label>
  <br><br>

  <label>
    Chiều cao (m):
    <input id="height" type="number" step="0.01" placeholder="VD: 1.70" />
  </label>
  <br><br>

  <button id="calcBtn">Tính BMI</button>

  <script>
    const $w = document.getElementById("weight");
    const $h = document.getElementById("height");
    const $btn = document.getElementById("calcBtn");

    function classifyWHO(bmi) {
      // WHO (bảng trong hình thường dùng):
      // < 18.5: gầy
      // 18.5 - 24.9: bình thường
      // 25 - 29.9: tiền béo phì (thừa cân)
      // 30 - 34.9: béo phì độ I
      // 35 - 39.9: béo phì độ II
      // >= 40: béo phì độ III
      if (bmi < 18.5) return "Cân nặng thấp (gầy)";
      if (bmi < 25)   return "Bình thường";
      if (bmi < 30)   return "Tiền béo phì (Thừa cân)";
      if (bmi < 35)   return "Béo phì độ I";
      if (bmi < 40)   return "Béo phì độ II";
      return "Béo phì độ III";
    }

    function calcBMI(weightKg, heightM) {
      return weightKg / (heightM * heightM);
    }

    function parsePositiveNumber(value) {
      const n = Number(String(value).trim());
      if (!Number.isFinite(n) || n <= 0) return null;
      return n;
    }

    function handleCalc() {
      const w = parsePositiveNumber($w.value);
      const h = parsePositiveNumber($h.value);

      if (w === null) {
        alert("Vui lòng nhập cân nặng hợp lệ (kg > 0).");
        $w.focus();
        return;
      }
      if (h === null) {
        alert("Vui lòng nhập chiều cao hợp lệ (m > 0).");
        $h.focus();
        return;
      }

      const bmi = calcBMI(w, h);
      const type = classifyWHO(bmi);

      alert(
        "BMI = " + bmi.toFixed(2) + "\n" +
        "Phân loại: " + type
      );
    }

    $btn.addEventListener("click", handleCalc);

    // Enter để tính
    [$w, $h].forEach(el => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleCalc();
      });
    });
  </script>
</body>
</html>
