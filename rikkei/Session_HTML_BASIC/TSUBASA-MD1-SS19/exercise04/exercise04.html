<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="./exercise04.css" />
</head>
<body>
  <main class="card">
    <h1 class="title">Todo App</h1>

    <section class="add-row">
      <input id="todoInput" class="input" placeholder="Add your new todo" />
      <button id="addBtn" class="btn btn-primary" title="Add">+</button>
    </section>

    <section id="list" class="list"></section>

    <footer class="footer">
      <div class="count">
        You have <b id="pendingCount">0</b> pending tasks
      </div>
      <button id="clearBtn" class="btn btn-clear">Clear All</button>
    </footer>
  </main>

  <script src="./exercise04.js"></script>
</body>
</html>
